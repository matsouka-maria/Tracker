<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker</title>
<style>
:root {
--bg: #0f0e1a;
--panel: #1a1830;
--panel-2: #211e3d;
--border: #322d54;
--text: #ece9f7;
--text-dim: #9a93bd;
--text-faint: #6b6490;
--codedex: #b388ff;
--codedex-2: #4dd0c4;
--codedex-3: #ff79b0;
--codedex-4: #ffd166;
--harvard: #d23a4f;
--mit: #c23b3b;
--duth: #3f7fe0;
--odin: #6f5bd6;
--gmarketing: #34a853;
--coursera: #2a73e8;
--coursera-2: #ff6f61;
--coursera-3: #00b8d9;
--coursera-4: #f5a623;
}

* { box-sizing: border-box; }

html, body {
margin: 0; padding: 0;
background: var(--bg);
color: var(--text);
font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
min-height: 100vh;
}

.app {
display: grid;
grid-template-columns: 1fr;
min-height: 100vh;
}

/* SIDEBAR - Mobile First */
.sidebar {
background: var(--panel);
border-bottom: 1px solid var(--border);
padding: 20px 16px;
display: flex;
flex-direction: column;
gap: 12px;
order: -1;
}

.sidebar h1 {
font-size: 24px;
margin: 0 0 4px 0;
font-weight: 800;
letter-spacing: 0.2px;
}

.sidebar .sub {
margin: 0 0 16px 0;
font-size: 14px;
color: var(--text-faint);
}

.top-row {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 12px;
margin-bottom: 12px;
}

.school-btn {
display: flex;
align-items: center;
gap: 12px;
background: transparent;
border: 1px solid transparent;
border-radius: 14px;
padding: 14px 14px;
cursor: pointer;
text-align: left;
transition: background 0.15s, border-color 0.15s;
color: var(--text);
font-family: inherit;
width: 100%;
min-width: 0;
}

.school-btn:hover {
background: var(--panel-2);
}

.school-btn.active {
background: var(--panel-2);
border-color: var(--ring-color);
}

.ring-wrap {
position: relative;
width: 60px;
height: 60px;
flex-shrink: 0;
}

.ring-wrap svg { transform: rotate(-90deg); }

.ring-bg { fill: none; stroke: var(--border); stroke-width: 5; }

.ring-fg {
fill: none;
stroke: var(--ring-color);
stroke-width: 5;
stroke-linecap: round;
transition: stroke-dashoffset 0.4s ease;
}

.ring-pct {
position: absolute;
top: 0; left: 0; width: 100%; height: 100%;
display: flex; align-items: center; justify-content: center;
font-size: 13px;
font-weight: 700;
color: var(--ring-color);
}

.school-name { font-size: 18px; font-weight: 700; }

.school-meta { font-size: 13px; color: var(--text-faint); margin-top: 2px; }

.sidebar-footer {
margin-top: 12px;
padding: 12px 0;
font-size: 12px;
color: var(--text-faint);
border-top: 1px solid var(--border);
}

.countdown-card {
background: linear-gradient(135deg, var(--panel-2), var(--panel));
border: 1px solid var(--border);
border-radius: 12px;
padding: 14px 12px;
text-align: center;
height: 100%;
}

.countdown-label {
font-size: 11px;
text-transform: uppercase;
letter-spacing: 1px;
color: var(--text-faint);
font-weight: 700;
margin-bottom: 8px;
}

.countdown-big {
font-size: 32px;
font-weight: 800;
color: var(--codedex-4);
line-height: 1;
}

.overall-card .countdown-big {
color: var(--codedex-2);
}

.countdown-unit-label {
font-size: 11px;
color: var(--text-faint);
margin-top: 6px;
text-transform: uppercase;
letter-spacing: 0.6px;
}

/* MAIN */
.main {
padding: 28px 16px;
}

.main-header {
display: flex;
align-items: baseline;
justify-content: space-between;
margin-bottom: 8px;
flex-wrap: wrap;
gap: 12px;
}

.main-header h2 {
font-size: 32px;
margin: 0;
font-weight: 800;
color: var(--accent);
}

.overall-pct {
font-size: 16px;
color: var(--text-dim);
font-weight: 600;
}

.overall-pct span { color: var(--accent); font-weight: 800; }

.progress-track {
width: 100%;
height: 10px;
background: var(--panel-2);
border-radius: 8px;
overflow: hidden;
margin: 16px 0 32px;
border: 1px solid var(--border);
}

.progress-fill {
height: 100%;
background: var(--accent);
border-radius: 8px;
transition: width 0.4s ease;
}

.category {
margin-bottom: 32px;
}

.category-title {
font-size: 14px;
text-transform: uppercase;
letter-spacing: 1.4px;
color: var(--accent);
margin-bottom: 14px;
font-weight: 800;
opacity: 0.9;
}

.course-grid {
display: grid;
grid-template-columns: 1fr;
gap: 12px;
align-items: start;
}

.course-block {
background: var(--panel);
border: 1px solid var(--border);
border-radius: 12px;
overflow: hidden;
transition: border-color 0.15s, background 0.15s;
}

.course-block:hover { border-color: var(--row-accent); }

.course-block.done { border-color: var(--row-accent); }

.course-block.expanded {
grid-column: 1 / -1;
}

.course-row {
display: flex;
align-items: center;
gap: 12px;
padding: 14px 14px;
cursor: pointer;
user-select: none;
}

.course-row.simple {
background: var(--panel);
border: 1px solid var(--border);
border-radius: 12px;
transition: border-color 0.15s, background 0.15s;
}

.course-row.simple:hover { border-color: var(--row-accent); }

.course-row.simple.done {
background: var(--panel-2);
border-color: var(--row-accent);
}

.checkbox {
width: 24px; height: 24px;
border-radius: 6px;
border: 2.5px solid var(--text-faint);
flex-shrink: 0;
display: flex; align-items: center; justify-content: center;
transition: background 0.15s, border-color 0.15s;
}

.course-row.simple.done .checkbox,
.sub-row.done .checkbox {
background: var(--row-accent);
border-color: var(--row-accent);
}

.checkbox svg { width: 15px; height: 15px; opacity: 0; transition: opacity 0.1s; }

.course-row.simple.done .checkbox svg,
.sub-row.done .checkbox svg { opacity: 1; }

.checkbox.subcount {
width: auto;
min-width: 24px;
height: 24px;
padding: 0 6px;
border-radius: 6px;
font-size: 11px;
font-weight: 700;
color: var(--text-dim);
border-color: var(--border);
background: var(--panel-2);
}

.course-block.done .checkbox.subcount {
background: var(--row-accent);
border-color: var(--row-accent);
color: var(--bg);
}

.chevron {
margin-left: auto;
flex-shrink: 0;
width: 18px; height: 18px;
color: var(--text-faint);
display: flex; align-items: center; justify-content: center;
transition: transform 0.2s ease, color 0.15s;
}

.chevron svg { width: 16px; height: 16px; }

.chevron.open { transform: rotate(180deg); color: var(--row-accent); }

.sub-list {
max-height: 0;
overflow: hidden;
transition: max-height 0.25s ease;
border-top: 1px solid transparent;
}

.sub-list.open {
max-height: 1200px;
border-top: 1px solid var(--border);
display: grid;
grid-template-columns: 1fr;
}

.sub-row {
display: flex;
align-items: center;
gap: 12px;
padding: 10px 14px;
cursor: pointer;
user-select: none;
transition: background 0.12s;
}

.sub-row:hover { background: var(--panel-2); }

.sub-row .checkbox {
width: 20px; height: 20px;
border-radius: 4px;
}

.sub-row .checkbox svg { width: 12px; height: 12px; }

.sub-name {
font-size: 14px;
color: var(--text-dim);
}

.sub-row.done .sub-name {
color: var(--text-faint);
text-decoration: line-through;
text-decoration-color: var(--text-faint);
}

.course-name {
font-size: 15px;
color: var(--text);
font-weight: 600;
flex: 1;
min-width: 0;
line-height: 1.3;
}

.course-block.done .course-name,
.course-row.simple.done .course-name {
color: var(--text-dim);
}

.course-row.simple.done .course-name {
text-decoration: line-through;
text-decoration-color: var(--text-faint);
}

.course-link {
color: inherit;
text-decoration: none;
border-bottom: 1px dashed var(--text-faint);
transition: border-color 0.15s, color 0.15s;
}

.course-link:hover {
color: var(--row-accent);
border-color: var(--row-accent);
}

.reset-btn {
margin-top: 16px;
background: none;
border: 1px solid var(--border);
color: var(--text-faint);
font-size: 14px;
padding: 10px 16px;
border-radius: 8px;
cursor: pointer;
font-family: inherit;
width: 100%;
}

.reset-btn:hover { border-color: var(--accent); color: var(--accent); }

.fullscreen-btn {
position: fixed;
top: 14px;
right: 14px;
z-index: 100;
display: flex;
align-items: center;
gap: 6px;
background: var(--panel-2);
border: 1px solid var(--border);
color: var(--text-dim);
font-size: 12px;
font-weight: 600;
padding: 8px 12px;
border-radius: 8px;
cursor: pointer;
font-family: inherit;
transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.fullscreen-btn:hover {
border-color: var(--codedex);
color: var(--text);
background: var(--panel);
}
.fullscreen-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
.fullscreen-btn #fsLabel { display: none; }

.sync-indicator {
position: fixed;
top: 14px;
left: 14px;
z-index: 100;
font-size: 12px;
font-weight: 600;
padding: 6px 12px;
border-radius: 8px;
background: var(--panel-2);
border: 1px solid var(--border);
color: var(--text-faint);
opacity: 0;
transition: opacity 0.3s ease;
}
.sync-indicator.show { opacity: 1; }

@media (min-width: 600px) {
.fullscreen-btn {
top: 18px;
right: 22px;
padding: 10px 16px;
font-size: 14px;
gap: 8px;
}
.fullscreen-btn svg { width: 16px; height: 16px; }
.fullscreen-btn #fsLabel { display: inline; }
}

/* TABLET & DESKTOP */
@media (min-width: 600px) {
.app {
grid-template-columns: 350px 1fr;
}

.sidebar {
flex-direction: column;
border-right: 1px solid var(--border);
border-bottom: none;
padding: 32px 20px;
gap: 14px;
order: initial;
}

.sidebar h1 {
font-size: 26px;
margin: 0 0 6px 6px;
}

.sidebar .sub {
margin: 0 0 24px 6px;
font-size: 15px;
}

.school-btn {
padding: 16px 16px;
gap: 14px;
}

.ring-wrap {
width: 64px;
height: 64px;
}

.ring-pct {
font-size: 14px;
}

.school-name { font-size: 19px; }

.school-meta { font-size: 13.5px; }

.main {
padding: 40px 48px;
}

.main-header h2 {
font-size: 38px;
}

.countdown-card {
padding: 16px 14px;
}

.countdown-big {
font-size: 36px;
}

.course-grid {
grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
}

.course-row {
padding: 16px 16px;
gap: 14px;
}

.sub-list.open {
grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
}

.checkbox {
width: 26px;
height: 26px;
}

.sub-row {
padding: 12px 16px;
}

.sub-row .checkbox {
width: 22px;
height: 22px;
}

.reset-btn {
width: auto;
}
}

@media (min-width: 1024px) {
.sidebar {
padding: 40px 26px;
}

.sidebar h1 {
font-size: 28px;
margin: 0 0 6px 8px;
}

.sidebar .sub {
margin: 0 0 32px 8px;
font-size: 16px;
}

.school-btn {
padding: 20px 20px;
gap: 20px;
}

.ring-wrap {
width: 70px;
height: 70px;
}

.ring-pct {
font-size: 15px;
}

.school-name { font-size: 21px; }

.school-meta { font-size: 14.5px; margin-top: 4px; }

.main {
padding: 50px 64px;
}

.main-header h2 {
font-size: 44px;
}

.overall-pct {
font-size: 20px;
}

.progress-track {
margin: 22px 0 48px;
height: 12px;
}

.category-title {
font-size: 17px;
letter-spacing: 1.6px;
margin-bottom: 18px;
}

.course-grid {
grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
gap: 16px;
}

.course-row {
padding: 18px 20px;
gap: 14px;
}

.sub-list.open {
grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
gap: 16px;
padding: 16px;
}

.sub-row {
padding: 13px 20px;
}

.checkbox {
width: 28px;
height: 28px;
}

.checkbox.subcount {
min-width: 28px;
height: 28px;
padding: 0 8px;
font-size: 12.5px;
}

.sub-row .checkbox {
width: 22px;
height: 22px;
}

.course-name {
font-size: 16.5px;
}

.sub-name {
font-size: 15.5px;
}

.checkbox svg {
width: 17px;
height: 17px;
}

.sub-row .checkbox svg {
width: 13px;
height: 13px;
}
}
</style>
</head>
<body>

<main class="main" id="mainPanel"></main>
</div>

const STORAGE_KEY = "tracker-state";
let state = {};
let saveTimer = null;

async function loadState() {
try {
const result = await window.storage.get(STORAGE_KEY);
if (result && result.value) state = JSON.parse(result.value);
} catch (e) {
state = {};
}
renderAll();
}

function showSyncIndicator(text) {
const el = document.getElementById("syncIndicator");
el.textContent = text;
el.classList.add("show");
clearTimeout(el._hideTimer);
el._hideTimer = setTimeout(() => el.classList.remove("show"), 1200);
}

function saveState() {
showSyncIndicator("Saving...");
clearTimeout(saveTimer);
saveTimer = setTimeout(async () => {
try {
await window.storage.set(STORAGE_KEY, JSON.stringify(state));
showSyncIndicator("Saved ✓");
} catch (e) {
showSyncIndicator("Save failed");
}
}, 300);
}

let activeSchool = "codedex";
let expanded = {};

function courseInfo(course) {
if (typeof course === "string") return { name: course, url: null, subs: null };
return { name: course.name, url: course.url || null, subs: course.subs || null };
}

function isDone(school, itemKey) {
return !!(state[school] && state[school][itemKey]);
}

function toggle(school, itemKey) {
if (!state[school]) state[school] = {};
state[school][itemKey] = !state[school][itemKey];
saveState();
renderAll();
}

function toggleExpand(school, courseName) {
const key = school + "::" + courseName;
expanded[key] = !expanded[key];
renderMain();
}

function courseStats(school, courseEntry) {
const { name, subs } = courseInfo(courseEntry);
if (subs && subs.length) {
let done = 0;
subs.forEach(sub => {
if (isDone(school, name + "::" + sub)) done++;
});
return { total: subs.length, done, pct: Math.round((done / subs.length) * 100) };
}
const done = isDone(school, name) ? 1 : 0;
return { total: 1, done, pct: done ? 100 : 0 };
}

function schoolStats(key) {
const school = DATA[key];
let total = 0, done = 0;
school.categories.forEach(cat => {
cat.courses.forEach(c => {
const cs = courseStats(key, c);
total += cs.total;
done += cs.done;
});
});
return { total, done, pct: total ? Math.round((done / total) * 100) : 0 };
}

function escapeHtml(str) {
return String(str).replace(/[&<>"']/g, ch => ({
"&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
}[ch]));
}

function ring(pct, color) {
const r = 30, c = 2 * Math.PI * r;
const offset = c - (pct / 100) * c;
return `
<div class="ring-wrap" style="--ring-color:${color}">
<svg width="70" height="70" viewBox="0 0 70 70">
<circle class="ring-bg" cx="35" cy="35" r="${r}"></circle>
<circle class="ring-fg" cx="35" cy="35" r="${r}" stroke-dasharray="${c}" stroke-dashoffset="${offset}"></circle>
</svg>
<div class="ring-pct">${pct}%</div>
</div>
`;
}

function renderSidebar() {
const el = document.getElementById("sidebarList");
el.innerHTML = Object.keys(DATA).map(key => {
const school = DATA[key];
const stats = schoolStats(key);
const active = key === activeSchool ? "active" : "";
return `
<button class="school-btn ${active}" style="--ring-color:${school.color}" data-school="${key}">
${ring(stats.pct, school.color)}
<div>
<div class="school-name">${school.icon} ${school.label}</div>
<div class="school-meta">${stats.done}/${stats.total} courses</div>
</div>
</button>
`;
}).join("");
}

function renderMain() {
const school = DATA[activeSchool];
const stats = schoolStats(activeSchool);
const el = document.getElementById("mainPanel");
el.style.setProperty("--accent", school.color);

let html = `
<div class="main-header">
<h2>${school.icon} ${school.label}</h2>
<div class="overall-pct"><span>${stats.pct}%</span> complete &middot; ${stats.done}/${stats.total}</div>
</div>
<div class="progress-track"><div class="progress-fill" style="width:${stats.pct}%"></div></div>
`;

school.categories.forEach(cat => {
html += `<div class="category">`;
if (school.categories.length > 1) {
html += `<div class="category-title" style="color:${cat.color}">${escapeHtml(cat.title)}</div>`;
}
html += `<div class="course-grid">`;

cat.courses.forEach(courseEntry => {
const { name: course, url, subs } = courseInfo(courseEntry);
const nameMarkup = url
? `<a class="course-link" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">${escapeHtml(course)}</a>`
: escapeHtml(course);

if (subs && subs.length) {
const cs = courseStats(activeSchool, courseEntry);
const done = cs.done === cs.total;
const expandKey = activeSchool + "::" + course;
const isOpen = !!expanded[expandKey];

html += `
<div class="course-block ${done ? 'done' : ''} ${isOpen ? 'expanded' : ''}" style="--row-accent:${cat.color}">
<div class="course-row" data-expand-course="${escapeHtml(course)}">
<div class="checkbox subcount">${cs.done}/${cs.total}</div>
<div class="course-name">${nameMarkup}</div>
<div class="chevron ${isOpen ? 'open' : ''}">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
</div>
</div>
<div class="sub-list ${isOpen ? 'open' : ''}">
${subs.map(sub => {
const subKey = course + "::" + sub;
const subDone = isDone(activeSchool, subKey);
return `
<div class="sub-row ${subDone ? 'done' : ''}" data-sub-course="${escapeHtml(course)}" data-sub-name="${escapeHtml(sub)}">
<div class="checkbox sub-checkbox">
<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
<polyline points="20 6 9 17 4 12"></polyline>
</svg>
</div>
<div class="sub-name">${escapeHtml(sub)}</div>
</div>
`;
}).join("")}
</div>
</div>
`;
} else {
const done = isDone(activeSchool, course);
html += `
<div class="course-row simple ${done ? 'done' : ''}" style="--row-accent:${cat.color}" data-course="${escapeHtml(course)}">
<div class="checkbox">
<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
<polyline points="20 6 9 17 4 12"></polyline>
</svg>
</div>
<div class="course-name">${nameMarkup}</div>
</div>
`;
}
});

html += `</div></div>`;
});

html += `<button class="reset-btn" data-reset="${activeSchool}">Reset ${school.label} progress</button>`;
el.innerHTML = html;
}

function setActive(key) {
activeSchool = key;
renderAll();
}

function resetSchool(key) {
if (confirm(`Reset all progress for ${DATA[key].label}?`)) {
state[key] = {};
saveState();
renderAll();
}
}

function renderCountdown() {
const target = new Date(2026, 6, 20, 0, 0, 0);
const now = new Date();
const diffMs = target - now;
const el = document.getElementById("countdownCard");

if (diffMs <= 0) {
el.innerHTML = `
<div class="countdown-card">
<div class="countdown-label">⏳ Jul 20</div>
<div class="countdown-done">🎉 Reached!</div>
</div>
`;
return;
}

const days = Math.ceil(diffMs / 86400000);
el.innerHTML = `
<div class="countdown-card">
<div class="countdown-label">⏳ Jul 20</div>
<div class="countdown-big">${days}</div>
<div class="countdown-unit-label">days left</div>
</div>
`;
}

function renderOverallProgress() {
let total = 0, done = 0;
Object.keys(DATA).forEach(key => {
const stats = schoolStats(key);
total += stats.total;
done += stats.done;
});

const pct = total ? Math.round((done / total) * 100) : 0;
const el = document.getElementById("overallCard");
el.innerHTML = `
<div class="countdown-card overall-card">
<div class="countdown-label">📊 Overall</div>
<div class="countdown-big">${pct}%</div>
<div class="countdown-unit-label">${done}/${total} courses</div>
</div>
`;
}

function renderAll() {
renderCountdown();
renderOverallProgress();
renderSidebar();
renderMain();
}

document.getElementById("sidebarList").addEventListener("click", (e) => {
const btn = e.target.closest(".school-btn");
if (btn) setActive(btn.dataset.school);
});

document.getElementById("mainPanel").addEventListener("click", (e) => {
const subRow = e.target.closest(".sub-row");
if (subRow) {
const course = subRow.dataset.subCourse;
const sub = subRow.dataset.subName;
toggle(activeSchool, course + "::" + sub);
return;
}

const expandRow = e.target.closest("[data-expand-course]");
if (expandRow) {
toggleExpand(activeSchool, expandRow.dataset.expandCourse);
return;
}

const simpleRow = e.target.closest(".course-row.simple");
if (simpleRow) { toggle(activeSchool, simpleRow.dataset.course); return; }

const resetBtn = e.target.closest(".reset-btn");
if (resetBtn) resetSchool(resetBtn.dataset.reset);
});

loadState();
setInterval(renderCountdown, 1000 * 60 * 5);

const fsBtn = document.getElementById("fullscreenBtn");
const fsLabel = document.getElementById("fsLabel");
const fsIcon = document.getElementById("fsIcon");
const ENTER_ICON = '<path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>';
const EXIT_ICON = '<path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path>';
fsBtn.addEventListener("click", () => {
if (!document.fullscreenElement) {
document.documentElement.requestFullscreen().catch(() => {});
} else {
document.exitFullscreen();
}
});
document.addEventListener("fullscreenchange", () => {
if (document.fullscreenElement) {
fsLabel.textContent = "Exit";
fsIcon.innerHTML = EXIT_ICON;
} else {
fsLabel.textContent = "Fullscreen";
fsIcon.innerHTML = ENTER_ICON;
}
});
</script>
